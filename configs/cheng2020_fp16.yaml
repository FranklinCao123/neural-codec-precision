experiment:
  name: cheng2020_fp16_inference
  seed: 1234

model:
  source: compressai
  name: cheng2020-anchor
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: fp16
  keep_entropy_model_fp32: true

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  save_reconstructions: false

output:
  dir: results/raw/cheng2020_fp16
