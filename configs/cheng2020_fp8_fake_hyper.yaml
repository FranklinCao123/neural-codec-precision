experiment:
  name: cheng2020_fp8_fake_hyper
  seed: 1234

model:
  source: compressai
  name: cheng2020-anchor
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: fp8_fake_hyper
  method: activation_fake_quant
  fake_dtype: fp8_e4m3
  activation_modules:
    - h_a
    - h_s

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  benchmark_forward: true
  benchmark_memory: true
  forward_warmup: 1
  forward_repeats: 3
  save_reconstructions: false

output:
  dir: results/raw/cheng2020_fp8_fake_hyper
