experiment:
  name: cheng2020_mixed_ga_fp16_gs_hyper_int8
  seed: 1234

model:
  source: compressai
  name: cheng2020-anchor
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  calibration_root: data/kodak
  batch_size: 1
  num_workers: 0

calibration:
  root: data/kodak
  num_images: 24

precision:
  mode: mixed_ga_fp16_gs_hyper_int8
  method: ga_fp16_with_gs_hyper_calibrated_int8_ptq
  weight_quantization: per_channel
  activation_quantization: calibrated_symmetric_per_tensor
  int8_modules:
    - g_s
    - h_a
    - h_s
  mixed_precision:
    fp16_modules:
      - g_a
    keep_entropy_model_fp32: true
    keep_likelihoods_fp32: true

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  benchmark_forward: true
  benchmark_memory: true
  forward_warmup: 1
  forward_repeats: 3
  save_reconstructions: false

output:
  dir: results/raw/cheng2020_mixed_ga_fp16_gs_hyper_int8
