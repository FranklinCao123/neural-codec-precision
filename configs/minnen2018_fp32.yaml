experiment:
  name: minnen2018_fp32_baseline
  seed: 1234

model:
  source: compressai
  name: minnen2018
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: fp32

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  benchmark_forward: true
  benchmark_memory: true
  forward_warmup: 1
  forward_repeats: 3
  save_reconstructions: false

output:
  dir: results/raw/minnen2018_fp32
