experiment:
  name: cheng2020_fp16_weights_transforms
  seed: 1234

model:
  source: compressai
  name: cheng2020-anchor
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: fp16_weights_transforms
  keep_entropy_model_fp32: true
  fp16_modules:
    - g_a
    - g_s
    - h_a
    - h_s

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  codec_precision: fp32
  benchmark_forward: true
  benchmark_memory: true
  forward_precision: fp32
  forward_warmup: 1
  forward_repeats: 3
  save_reconstructions: false

output:
  dir: results/raw/cheng2020_fp16_weights_transforms
