experiment:
  name: cheng2020_mixed_fixed_very_aggressive
  seed: 1234

model:
  source: compressai
  name: cheng2020-anchor
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: mixed_fixed_very_aggressive
  method: fixed_point_activation_codec
  fixed_point_bits: 8
  module_fixed_point_bits:
    g_a: 8
    g_s: 12
    h_a: 8
    h_s: 8
  fractional_bits: null
  storage_mode: packed
  activation_modules:
    - g_a
    - g_s
    - h_a
    - h_s

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  benchmark_forward: false
  benchmark_memory: true
  save_reconstructions: false

output:
  dir: results/raw/cheng2020_mixed_fixed_very_aggressive
