experiment:
  name: bmshj2018_hyperprior_int8_ptq_transforms
  seed: 1234

model:
  source: compressai
  name: bmshj2018-hyperprior
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  calibration_root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: int8_ptq_transforms
  method: weight_fake_quant
  weight_quantization: per_channel
  activation_quantization: none
  int8_modules:
    - g_a
    - g_s
    - h_a
    - h_s
  mixed_precision:
    keep_entropy_model_fp32: true
    keep_likelihoods_fp32: true

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  benchmark_forward: true
  benchmark_memory: true
  forward_warmup: 1
  forward_repeats: 3
  save_reconstructions: false

output:
  dir: results/raw/bmshj2018_hyperprior_int8_ptq_transforms
