experiment:
  name: cheng2020_int12_fixed_probe
  seed: 1234

model:
  source: compressai
  name: cheng2020-anchor
  quality: 3
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: int12_fixed_probe
  method: fixed_point_activation_probe
  fixed_point_bits: 12
  fractional_bits: null
  activation_modules:
    - g_a
    - g_s
    - h_a
    - h_s

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  benchmark_forward: true
  benchmark_memory: true
  forward_warmup: 1
  forward_repeats: 3
  save_reconstructions: false

output:
  dir: results/raw/cheng2020_int12_fixed_probe
