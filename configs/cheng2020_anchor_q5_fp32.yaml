experiment:
  name: cheng2020_anchor_q5_fp32_baseline
  seed: 1234

model:
  source: compressai
  name: cheng2020-anchor
  quality: 5
  metric: mse
  pretrained: true

data:
  dataset: kodak
  root: data/kodak
  batch_size: 1
  num_workers: 0

precision:
  mode: fp32

evaluation:
  metrics:
    - bpp
    - psnr
    - ms_ssim
  benchmark_forward: true
  benchmark_memory: true
  forward_warmup: 1
  forward_repeats: 3
  save_reconstructions: false

output:
  dir: results/raw/cheng2020_anchor_q5_fp32
